name: frontend
description: "StudyHive - Study Materials Sharing Platform"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  file_picker: ^8.3.7
  flutter_rating_bar: ^4.0.1
  path_provider: ^2.1.5
  mime: ^2.0.0
  intl: ^0.19.0
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"